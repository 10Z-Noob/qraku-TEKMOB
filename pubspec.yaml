name: qr_app
description: QR Code Generator & Scanner App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  
  # Utils
  share_plus: ^9.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
